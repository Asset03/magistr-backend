version: "3.9"

services:
  backend:
    build: .
    container_name: node_backend
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      - nlp_service
    restart: unless-stopped

  nlp_service:
    build:
      context: ./python-nlp-service
    container_name: python_nlp_service
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3