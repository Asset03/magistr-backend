                properties:
                  file:
                    $ref: '#/components/schemas/FileInfo'
                  extracted_info:
                    type: object

  /import/validate:
    post:
      tags:
        - Import/Export
      summary: Validate import data
      description: Validates data structure before import
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - format
              properties:
                data:
                  type: object
                format:
                  type: string
                  enum: [json, csv]
      responses:
        '200':
          description: Data validation completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_records:
                    type: integer
                  valid_records:
                    type: integer
                  invalid_records:
                    type: integer
                  validation_errors:
                    type: array
                    items:
                      type: object
                  is_valid:
                    type: boolean

  /import/status:
    get:
      tags:
        - Import/Export
      summary: Get import status and configuration
      description: Retrieves current import service status
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Import status retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  import_service:
                    type: object
                  etl_service:
                    type: object

  /import/etl/trigger:
    post:
      tags:
        - Import/Export
      summary: Trigger manual ETL
      description: Manually triggers ETL processes
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sources:
                  type: array
                  items:
                    type: string
                    enum: [openalex, crossref]
                  default: [openalex, crossref]
                fullSync:
                  type: boolean
                  default: false
      responses:
        '200':
          description: ETL process started
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  sources:
                    type: array
                    items:
                      type: string
                  full_sync:
                    type: boolean
                  result:
                    type: object

  /import/etl/status:
    get:
      tags:
        - Import/Export
      summary: Get ETL job status
      description: Retrieves status of ETL jobs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: ETL status retrieved
          content:
            application/json:
              schema:
                type: object

  /import/cleanup:
    delete:
      tags:
        - Import/Export
      summary: Clean up old upload files
      description: Removes old temporary upload files
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                maxAge:
                  type: integer
                  default: 86400000
                  description: Maximum age in milliseconds
      responses:
        '200':
          description: Cleanup completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  max_age_hours:
                    type: number
                  result:
                    type: object

  /import/statistics:
    get:
      tags:
        - Import/Export
      summary: Get import statistics
      description: Retrieves comprehensive import statistics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Import statistics retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  overview:
                    type: object
                    properties:
                      total_publications:
                        type: integer
                      total_authors:
                        type: integer
                      total_citations:
                        type: integer
                      recent_imports:
                        type: integer
                  imports_by_source:
                    type: array
                    items:
                      type: object
                  import_service:
                    type: object
                  etl_service:
                    type: object

  /import/export:
    get:
      tags:
        - Import/Export
      summary: Export publications
      description: Exports publications data in specified format
      security:
        - bearerAuth: []
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [json, csv]
        - name: filters
          in: query
          schema:
            type: object
      responses:
        '200':
          description: Export file download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource ID

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number for pagination

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Number of items per page

    YearParam:
      name: year
      in: query
      schema:
        type: integer
        minimum: 1800
        maximum: 2100
      description: Publication year filter

    AuthorParam:
      name: author
      in: query
      schema:
        type: string
      description: Filter by author name

    JournalParam:
      name: journal
      in: query
      schema:
        type: string
      description: Filter by journal name

    MinCitationsParam:
      name: minCitations
      in: query
      schema:
        type: integer
        minimum: 0
      description: Minimum citation count filter

    SearchParam:
      name: search
      in: query
      schema:
        type: string
      description: Full-text search query

    SortByParam:
      name: sortBy
      in: query
      schema:
        type: string
        enum: [created_at, title, citations_count, publication_year, h_index, total_citations, popularity_score]
      description: Field to sort by

    SortOrderParam:
      name: sortOrder
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
      description: Sort order

    CountryParam:
      name: country
      in: query
      schema:
        type: string
      description: Filter by country

    AffiliationParam:
      name: affiliation
      in: query
      schema:
        type: string
      description: Filter by affiliation name

    MinHIndexParam:
      name: minHIndex
      in: query
      schema:
        type: integer
        minimum: 0
      description: Minimum h-index filter

    CareerStageParam:
      name: careerStage
      in: query
      schema:
        type: string
        enum: [phd_student, postdoc, assistant_professor, associate_professor, professor, researcher, industry_professional, retired]
      description: Filter by career stage

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        full_name:
          type: string
        role:
          type: string
        status:
          type: string
        email_verified:
          type: boolean
        created_at:
          type: string
          format: date-time

    UserProfile:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            first_name:
              type: string
            last_name:
              type: string
            avatar:
              type: string
            bio:
              type: string
            institution:
              $ref: '#/components/schemas/Institution'
            research_interests:
              type: array
              items:
                type: string
            academic_profile:
              $ref: '#/components/schemas/AcademicProfile'
            preferences:
              $ref: '#/components/schemas/UserPreferences'
            statistics:
              $ref: '#/components/schemas/UserStatistics'
            profile_completion:
              type: integer

    Institution:
      type: object
      properties:
        name:
          type: string
        department:
          type: string
        position:
          type: string
        country:
          type: string

    AcademicProfile:
      type: object
      properties:
        google_scholar:
          type: string
        researchgate:
          type: string
        linkedin:
          type: string
        personal_website:
          type: string

    UserPreferences:
      type: object
      properties:
        language:
          type: string
        timezone:
          type: string
        email_notifications:
          type: boolean
        newsletter:
          type: boolean
        privacy:
          type: object
          properties:
            profile_visibility:
              type: string
            show_email:
              type: boolean

    UserStatistics:
      type: object
      properties:
        publications_viewed:
          type: integer
        searches_performed:
          type: integer
        downloads:
          type: integer
        citations_added:
          type: integer

    Session:
      type: object
      properties:
        session_id:
          type: string
        ip_address:
          type: string
        created_at:
          type: string
          format: date-time
        last_activity:
          type: string
          format: date-time
        is_current:
          type: boolean

    ApiKey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        last_used:
          type: string
          format: date-time
        usage_count:
          type: integer

    Publication:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        abstract:
          type: string
        publication_year:
          type: integer
        doi:
          type: string
        authors:
          type: array
          items:
            $ref: '#/components/schemas/AuthorReference'
        journal:
          $ref: '#/components/schemas/Journal'
        citations_count:
          type: integer
        keywords:
          type: array
          items:
            $ref: '#/components/schemas/Keyword'
        created_at:
          type: string
          format: date-time

    PublicationDetail:
      allOf:
        - $ref: '#/components/schemas/Publication'
        - type: object
          properties:
            full_text:
              type: string
            embeddings:
              $ref: '#/components/schemas/Embeddings'
            sentiment_score:
              $ref: '#/components/schemas/SentimentScore'
            topics:
              type: array
              items:
                $ref: '#/components/schemas/TopicReference'
            citations:
              type: array
              items:
                $ref: '#/components/schemas/CitationReference'
            references:
              type: array
              items:
                $ref: '#/components/schemas/CitationReference'

    PublicationCreate:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        abstract:
          type: string
        publication_year:
          type: integer
        doi:
          type: string
        authors:
          type: array
          items:
            $ref: '#/components/schemas/AuthorReference'
        journal:
          $ref: '#/components/schemas/Journal'
        keywords:
          type: array
          items:
            $ref: '#/components/schemas/Keyword'

    PublicationUpdate:
      type: object
      properties:
        title:
          type: string
        abstract:
          type: string
        publication_year:
          type: integer
        doi:
          type: string
        authors:
          type: array
          items:
            $ref: '#/components/schemas/AuthorReference'
        journal:
          $ref: '#/components/schemas/Journal'
        keywords:
          type: array
          items:
            $ref: '#/components/schemas/Keyword'

    AuthorReference:
      type: object
      properties:
        author_id:
          type: string
        name:
          type: string
        order:
          type: integer
        affiliation:
          type: string

    Journal:
      type: object
      properties:
        name:
          type: string
        volume:
          type: string
        issue:
          type: string
        pages:
          type: string
        issn:
          type: string
        publisher:
          type: string

    Keyword:
      type: object
      properties:
        term:
          type: string
        weight:
          type: number
        source:
          type: string

    Embeddings:
      type: object
      properties:
        title_vector:
          type: array
          items:
            type: number
        abstract_vector:
          type: array
          items:
            type: number
        full_text_vector:
          type: array
          items:
            type: number
        model_version:
          type: string
        generated_at:
          type: string
          format: date-time

    SentimentScore:
      type: object
      properties:
        positive:
          type: number
        negative:
          type: number
        neutral:
          type: number

    TopicReference:
      type: object
      properties:
        topic_id:
          type: string
        confidence:
          type: number
        method:
          type: string

    CitationReference:
      type: object
      properties:
        publication_id:
          type: string
        title:
          type: string
        authors:
          type: array
          items:
            type: string
        year:
          type: integer

    Author:
      type: object
      properties:
        id:
          type: string
        full_name:
          type: string
        orcid:
          type: string
        h_index:
          type: integer
        total_citations:
          type: integer
        total_publications:
          type: integer
        affiliations:
          type: array
          items:
            $ref: '#/components/schemas/Institution'
        research_interests:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    AuthorDetail:
      allOf:
        - $ref: '#/components/schemas/Author'
        - type: object
          properties:
            publications:
              type: array
              items:
                $ref: '#/components/schemas/Publication'
            collaborators:
              type: array
              items:
                $ref: '#/components/schemas/Collaborator'
            statistics:
              type: object
              properties:
                citations_per_publication:
                  type: number
                publications_per_year:
                  type: number
                collaboration_count:
                  type: integer

    AuthorCreate:
      type: object
      required:
        - first_name
        - last_name
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        orcid:
          type: string
        affiliations:
          type: array
          items:
            $ref: '#/components/schemas/Institution'

    Collaborator:
      type: object
      properties:
        author:
          $ref: '#/components/schemas/Author'
        collaboration_count:
          type: integer
        last_collaboration_year:
          type: integer

    Citation:
      type: object
      properties:
        id:
          type: string
        citing_publication_id:
          type: string
        cited_publication_id:
          type: string
        citation_type:
          type: string
        sentiment:
          type: string
        self_citation:
          type: boolean
        semantic_similarity:
          type: number
        created_at:
          type: string
          format: date-time

    CitationDetail:
      allOf:
        - $ref: '#/components/schemas/Citation'
        - type: object
          properties:
            citation_text:
              type: string
            citation_position:
              type: string
            citation_strength:
              type: number
            citing_publication:
              $ref: '#/components/schemas/Publication'
            cited_publication:
              $ref: '#/components/schemas/Publication'

    CitationCreate:
      type: object
      required:
        - citing_publication_id
        - cited_publication_id
      properties:
        citing_publication_id:
          type: string
        cited_publication_id:
          type: string
        citation_text:
          type: string
        citation_type:
          type: string
        citation_position:
          type: string

    Topic:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        keywords:
          type: array
          items:
            $ref: '#/components/schemas/Keyword'
        total_publications:
          type: integer
        total_citations:
          type: integer
        popularity_score:
          type: number
        trend_direction:
          type: string
        created_at:
          type: string
          format: date-time

    TopicDetail:
      allOf:
        - $ref: '#/components/schemas/Topic'
        - type: object
          properties:
            parent_topic:
              $ref: '#/components/schemas/Topic'
            children:
              type: array
              items:
                $ref: '#/components/schemas/Topic'
            related_topics:
              type: array
              items:
                $ref: '#/components/schemas/RelatedTopic'
            top_authors:
              type: array
              items:
                $ref: '#/components/schemas/Author'
            top_journals:
              type: array
              items:
                $ref: '#/components/schemas/Journal'

    TopicCreate:
      type: object
      required:
        - name
        - category
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        keywords:
          type: array
          items:
            $ref: '#/components/schemas/Keyword'
        parent_topic_id:
          type: string

    RelatedTopic:
      type: object
      properties:
        topic:
          $ref: '#/components/schemas/Topic'
        relationship_type:
          type: string
        similarity_score:
          type: number

    Pagination:
      type: object
      properties:
        current:
          type: integer
        pages:
          type: integer
        total:
          type: integer
        limit:
          type: integer

    FileInfo:
      type: object
      properties:
        originalname:
          type: string
        filename:
          type: string
        size:
          type: integer
        mimetype:
          type: string

    ImportResult:
      type: object
      properties:
        total:
          type: integer
        processed:
          type: integer
        created:
          type: integer
        updated:
          type: integer
        errors:
          type: array
          items:
            type: object
            properties:
              row:
                type: integer
              error:
                type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              errors:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                    message:
                      type: string

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string

    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              field:
                type: string
