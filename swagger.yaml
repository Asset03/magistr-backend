openapi: 3.0.0
info:
  title: Scientific Publications API
  version: 1.0.0
  description: |
    A comprehensive backend API for analyzing scientific publications with NLP and ML capabilities.
    This system provides endpoints for managing publications, authors, citations, topics, and analytics.
    
    ## Features
    - Publication management with full-text search
    - Author profiles with collaboration networks
    - Citation analysis and relationship mapping
    - Topic modeling and trend analysis
    - Advanced analytics and insights
    - Data import/export capabilities
    - Secure authentication and authorization
    
    ## Authentication
    Most endpoints require JWT authentication. Include the token in the Authorization header:
    `Authorization: Bearer <your-jwt-token>`
    
    ## Rate Limiting
    API endpoints are rate-limited to prevent abuse. Limits vary by endpoint type.
  contact:
    name: API Support
    email: support@scientific-publications.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:4000/api
    description: Development server

paths:
  # Authentication Routes
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Creates a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  description: Unique username (3-30 characters)
                password:
                  type: string
                  minLength: 6
                  description: Password (minimum 6 characters)
                first_name:
                  type: string
                  description: First name (optional)
                last_name:
                  type: string
                  description: Last name (optional)
                institution:
                  type: object
                  description: Institution information (optional)
                  properties:
                    name:
                      type: string
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
                  refreshToken:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticates user and returns JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - identifier
                - password
              properties:
                identifier:
                  type: string
                  description: Username or email
                password:
                  type: string
                  description: User password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
                  refreshToken:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Generates new access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  description: Valid refresh token
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  refreshToken:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: User logout
      description: Logs out the user and invalidates the session
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'


  /auth/change-password:
    post:
      tags:
        - Authentication
      summary: Change password
      description: Changes authenticated user's password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  description: Current password
                newPassword:
                  type: string
                  minLength: 6
                  description: New password
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/profile:
    get:
      tags:
        - Authentication
      summary: Get current user profile
      description: Returns the profile information of the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Publication Routes
  /publications:
    get:
      tags:
        - Publications
      summary: List publications
      description: Retrieves a paginated list of publications with filtering and sorting options
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/YearParam'
        - $ref: '#/components/parameters/AuthorParam'
        - $ref: '#/components/parameters/JournalParam'
        - $ref: '#/components/parameters/MinCitationsParam'
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        '200':
          description: Publications retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  publications:
                    type: array
                    items:
                      $ref: '#/components/schemas/Publication'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags:
        - Publications
      summary: Create new publication
      description: Creates a new scientific publication with NLP processing
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicationCreate'
      responses:
        '201':
          description: Publication created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Publication'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /publications/{id}:
    get:
      tags:
        - Publications
      summary: Get publication by ID
      description: Retrieves detailed information about a specific publication
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Publication retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationDetail'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Publications
      summary: Update publication
      description: Updates an existing publication's information
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicationUpdate'
      responses:
        '200':
          description: Publication updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Publication'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Publications
      summary: Delete publication
      description: Soft deletes a publication (marks as deleted)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Publication deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /publications/search:
    post:
      tags:
        - Publications
      summary: Search publications
      description: Performs full-text search on publications with advanced filtering
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: Search query string
                filters:
                  type: object
                  description: Search filters
                  properties:
                    year:
                      type: integer
                    author:
                      type: string
                    journal:
                      type: string
                    minCitations:
                      type: integer
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  publications:
                    type: array
                    items:
                      $ref: '#/components/schemas/Publication'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  query:
                    type: string
                  filters:
                    type: object

  /publications/trending/{days}:
    get:
      tags:
        - Publications
      summary: Get trending publications
      description: Retrieves publications with high citation activity in recent days
      parameters:
        - name: days
          in: path
          required: true
          schema:
            type: integer
            default: 30
          description: Number of days to look back for trending
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Trending publications retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  publications:
                    type: array
                    items:
                      $ref: '#/components/schemas/Publication'
                  period_days:
                    type: integer
                  total:
                    type: integer

  /publications/author/{authorId}:
    get:
      tags:
        - Publications
      summary: Get publications by author
      description: Retrieves all publications by a specific author
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: string
          description: Author ID
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Author publications retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  publications:
                    type: array
                    items:
                      $ref: '#/components/schemas/Publication'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /publications/keyword/{keyword}:
    get:
      tags:
        - Publications
      summary: Get publications by keyword
      description: Retrieves publications containing a specific keyword
      parameters:
        - name: keyword
          in: path
          required: true
          schema:
            type: string
          description: Keyword to search for
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Publications retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  publications:
                    type: array
                    items:
                      $ref: '#/components/schemas/Publication'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /publications/import:
    post:
      tags:
        - Publications
      summary: Import publication from external source
      description: Imports publication data from external databases (OpenAlex, Crossref, arXiv, PubMed)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - source
                - identifier
              properties:
                source:
                  type: string
                  enum: [openalex, crossref, arxiv, pubmed]
                  description: External data source
                identifier:
                  type: string
                  description: Publication identifier in the external source
      responses:
        '201':
          description: Publication imported successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Publication'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Publication not found in external source
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '409':
          description: Publication already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  existingPublication:
                    $ref: '#/components/schemas/Publication'

  # Author Routes
  /authors:
    get:
      tags:
        - Authors
      summary: List authors
      description: Retrieves a paginated list of authors with filtering options
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CountryParam'
        - $ref: '#/components/parameters/AffiliationParam'
        - $ref: '#/components/parameters/MinHIndexParam'
        - $ref: '#/components/parameters/CareerStageParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        '200':
          description: Authors retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  authors:
                    type: array
                    items:
                      $ref: '#/components/schemas/Author'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags:
        - Authors
      summary: Create new author
      description: Creates a new author profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorCreate'
      responses:
        '201':
          description: Author created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'

  /authors/{id}:
    get:
      tags:
        - Authors
      summary: Get author by ID
      description: Retrieves detailed author information including publications and collaborators
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Author retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /authors/{id}/publications:
    get:
      tags:
        - Authors
      summary: Get author's publications
      description: Retrieves all publications by a specific author
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Author publications retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  publications:
                    type: array
                    items:
                      $ref: '#/components/schemas/Publication'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /authors/{id}/collaborators:
    get:
      tags:
        - Authors
      summary: Get author's collaborators
      description: Retrieves collaboration network for a specific author
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Collaborators retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  author_id:
                    type: string
                  author_name:
                    type: string
                  collaborators:
                    type: array
                    items:
                      $ref: '#/components/schemas/Collaborator'
                  total_collaborators:
                    type: integer

  /authors/search:
    post:
      tags:
        - Authors
      summary: Search authors
      description: Performs full-text search on authors with advanced filtering
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: Search query string
                filters:
                  type: object
                  description: Search filters
                  properties:
                    country:
                      type: string
                    affiliation:
                      type: string
                    minHIndex:
                      type: integer
                    careerStage:
                      type: string
                      enum: [phd_student, postdoc, assistant_professor, associate_professor, professor, researcher, industry_professional, retired]
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  authors:
                    type: array
                    items:
                      $ref: '#/components/schemas/Author'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  query:
                    type: string
                  filters:
                    type: object

  /authors/top/{metric}:
    get:
      tags:
        - Authors
      summary: Get top authors by metrics
      description: Retrieves authors ranked by specific metrics
      parameters:
        - name: metric
          in: path
          required: true
          schema:
            type: string
            enum: [h_index, total_citations, total_publications]
          description: Metric to sort by
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Number of results to return
        - name: country
          in: query
          schema:
            type: string
          description: Filter by country
      responses:
        '200':
          description: Top authors retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  authors:
                    type: array
                    items:
                      $ref: '#/components/schemas/Author'
                  metric:
                    type: string
                  total:
                    type: integer

  /authors/{id}/citation-network:
    get:
      tags:
        - Authors
      summary: Get author's citation network
      description: Retrieves citation network analysis for a specific author
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Citation network retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  author_id:
                    type: string
                  author_name:
                    type: string
                  publications:
                    type: integer
                  citation_network:
                    type: object
                    properties:
                      incoming_citations:
                        type: array
                        items:
                          $ref: '#/components/schemas/Citation'
                      outgoing_citations:
                        type: array
                        items:
                          $ref: '#/components/schemas/Citation'
                      total_incoming:
                        type: integer
                      total_outgoing:
                        type: integer
        '404':
          $ref: '#/components/responses/NotFound'

  /authors/{id}/metrics:
    put:
      tags:
        - Authors
      summary: Update author metrics
      description: Updates academic metrics for an author
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                h_index:
                  type: integer
                  minimum: 0
                g_index:
                  type: integer
                  minimum: 0
                i10_index:
                  type: integer
                  minimum: 0
                total_citations:
                  type: integer
                  minimum: 0
                total_publications:
                  type: integer
                  minimum: 0
      responses:
        '200':
          description: Author metrics updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  metrics:
                    type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /authors/affiliation/{affiliationName}:
    get:
      tags:
        - Authors
      summary: Get authors by affiliation
      description: Retrieves authors from a specific affiliation
      parameters:
        - name: affiliationName
          in: path
          required: true
          schema:
            type: string
          description: Affiliation name
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Authors retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  authors:
                    type: array
                    items:
                      $ref: '#/components/schemas/Author'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  affiliation:
                    type: string

  /authors/country/{countryName}:
    get:
      tags:
        - Authors
      summary: Get authors by country
      description: Retrieves authors from a specific country
      parameters:
        - name: countryName
          in: path
          required: true
          schema:
            type: string
          description: Country name
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Authors retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  authors:
                    type: array
                    items:
                      $ref: '#/components/schemas/Author'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  country:
                    type: string

  # Citation Routes
  /citations:
    get:
      tags:
        - Citations
      summary: List citations
      description: Retrieves a paginated list of citations with filtering
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: citingPublicationId
          in: query
          schema:
            type: string
          description: Filter by citing publication ID
        - name: citedPublicationId
          in: query
          schema:
            type: string
          description: Filter by cited publication ID
        - name: citationType
          in: query
          schema:
            type: string
            enum: [supporting, contradicting, mentioning, background, methodology, comparison]
        - name: sentiment
          in: query
          schema:
            type: string
            enum: [positive, negative, neutral]
        - name: selfCitation
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Citations retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  citations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Citation'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags:
        - Citations
      summary: Create new citation
      description: Creates a new citation relationship between publications
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CitationCreate'
      responses:
        '201':
          description: Citation created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Citation'

  /citations/{id}:
    get:
      tags:
        - Citations
      summary: Get citation by ID
      description: Retrieves detailed citation information
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Citation retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitationDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /citations/publication/{publicationId}/cited-by:
    get:
      tags:
        - Citations
      summary: Get citations for publication
      description: Retrieves all citations where this publication is cited
      parameters:
        - name: publicationId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Citations retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  citations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Citation'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /citations/publication/{publicationId}/citing:
    get:
      tags:
        - Citations
      summary: Get citations made by a publication
      description: Retrieves all citations where this publication cites other works
      parameters:
        - name: publicationId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Citing citations retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  citations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Citation'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /citations/publication/{publicationId}/network:
    get:
      tags:
        - Citations
      summary: Get citation network for publication
      description: Retrieves citation network graph for a publication
      parameters:
        - name: publicationId
          in: path
          required: true
          schema:
            type: string
        - name: depth
          in: query
          schema:
            type: integer
            default: 2
          description: Network depth to analyze
      responses:
        '200':
          description: Citation network retrieved
          content:
            application/json:
              schema:
